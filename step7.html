<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Biodata | Final Submission</title>
<link rel="stylesheet" href="maincss.css">

<style>



.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
}

/* File input styling */
input[type="file"] {
    padding: 6px;
    background: #fff;
}

/* Button Layout */
.form-actions {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
}

.right-actions {
    display: flex;
    gap: 10px;
}

/* Buttons */
.form-actions button,
.form-actions a {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    background: #00509e;
    color: #fff;
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
}

.form-actions button:hover,
.form-actions a:hover {
    background: #003f7d;
}

/* Declaration */
.declaration {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
}
</style>

</head>

<body>

<!-- HEADER -->
<header class="header">
<div class="container header-content">
<div class="header-text">
    <h1>Student Biodata Form</h1>
    <p class="dept">Final Step: Submission & Verification</p>
</div><div class="header-logo">
            <img src="logo.jpg" alt="College Logo">
        </div>
</div></header>

<!-- MAIN -->
<div class="container">

<section class="section">

<form action="success.html">

<div class="grid">

<div>
<label>Date of Reporting *</label>
<input type="date" name="reporting_date" required>
</div>

<div>
<label>Candidate Photo *</label>
<input type="file" accept="image/*" required>
</div>

<div>
<label>Signature *</label>
<input type="file" accept="image/*" required>
</div>

<div>
<label>Parent / Guardian Signature *</label>
<input type="file" accept="image/*" required>
</div>

</div>

<!-- DECLARATION -->

<div class="grid">

<label class="checkbox-item">
<input type="checkbox" required> 
I hereby declare that all the information provided is true and correct.
</label>



</div>

<!-- ACTION BUTTONS -->
<div class="form-actions">

    <!-- LEFT -->
    <a href="step6.html">Back</a>

    <!-- RIGHT -->
    <div class="right-actions">
        <button type="reset">Reset</button>
        <button type="submit">Final Submit</button>
    </div>

</div>

</form>

</section>

</div>

<!-- FOOTER -->
<footer class="footer">

    MGM Circle, Warangal - 506007, Telangana<br>
    Affiliated to SBTET Telangana | AICTE Approved<br>
    © 2026 GPW DCSE
</footer>


</body>
</html>
